<svg xmlns="http://w3.org" viewBox="0 0 100 100" width="100" height="100">
  <!-- Main Ball Background -->
  <circle cx="50" cy="50" r="48" fill="#ffffff" stroke="#000000" stroke-width="3"/>
  
  <!-- Center Pentagon -->
  <polygon points="50,38 61,46 57,59 43,59 39,46" fill="#000000"/>
  
  <!-- Outer Lines and Patches -->
  <!-- Top Patch -->
  <polygon points="50,2 43,15 57,15" fill="#000000"/>
  <line x1="50" y1="38" x2="50" y2="15" stroke="#000000" stroke-width="3"/>
  
  <!-- Bottom Left Patch -->
  <polygon points="18,74 29,66 22,78" fill="#000000"/>
  <line x1="39" y1="46" x2="29" y2="66" stroke="#000000" stroke-width="3"/>
  
  <!-- Bottom Right Patch -->
  <polygon points="82,74 71,66 78,78" fill="#000000"/>
  <line x1="61" y1="46" x2="71" y2="66" stroke="#000000" stroke-width="3"/>
  
  <!-- Top Left Patch -->
  <polygon points="14,32 25,38 18,24" fill="#000000"/>
  <line x1="43" y1="59" x2="25" y2="38" stroke="#000000" stroke-width="3"/>
  
  <!-- Top Right Patch -->
  <polygon points="86,32 75,38 82,24" fill="#000000"/>
  <line x1="57" y1="59" x2="75" y2="38" stroke="#000000" stroke-width="3"/>
  
  <!-- Additional connecting structural lines -->
  <line x1="43" y1="15" x2="25" y2="38" stroke="#000000" stroke-width="3"/>
  <line x1="57" y1="15" x2="75" y2="38" stroke="#000000" stroke-width="3"/>
  <line x1="29" y1="66" x2="43" y2="59" stroke="#000000" stroke-width="3"/>
  <line x1="71" y1="66" x2="57" y2="59" stroke="#000000" stroke-width="3"/>
</svg>
