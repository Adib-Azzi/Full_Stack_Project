<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legends XI | Live Scout</title>
  <meta name="description" content="Search and scout current football players using live data from top leagues." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <header>
    <nav class="navbar-custom" aria-label="Primary navigation">
      <div class="navbar-custom__container">
        <a href="index.html" class="navbar-custom__brand" aria-label="Legends XI home">
          <span class="navbar-custom__brand-mark">⚽</span>
          <span class="navbar-custom__brand-text">LEGENDS<span class="navbar-custom__brand-accent">XI</span></span>
        </a>
        <button class="navbar-custom__toggle" type="button" aria-expanded="false"
          aria-controls="primaryNavLinks" aria-label="Toggle navigation menu" id="navToggleBtn">
          <span class="navbar-custom__toggle-bar"></span>
          <span class="navbar-custom__toggle-bar"></span>
          <span class="navbar-custom__toggle-bar"></span>
        </button>
        <ul class="navbar-custom__links" id="primaryNavLinks">
          <li><a href="index.html" class="navbar-custom__link">Home</a></li>
          <li><a href="hall-of-fame.html" class="navbar-custom__link">Hall of Fame</a></li>
          <li><a href="live-scout.html" class="navbar-custom__link is-active">Live Scout</a></li>
          <li><a href="about.html" class="navbar-custom__link">About</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main id="main-content">

    <section class="hero">
      <div class="container">
        <h1 class="hero__title">Live Scout</h1>
        <p class="hero__subtitle">Search players across the world's top leagues using live football data.</p>
      </div>
    </section>

    <section class="container" aria-label="Search controls">
      <form id="scoutSearchForm" class="scout-search-form" role="search" novalidate>

        <!-- Player name -->
        <label for="scoutSearchInput" class="visually-hidden">Search player name</label>
        <input
          type="text"
          id="scoutSearchInput"
          class="scout-search-form__input"
          placeholder="Player name (e.g. Mbappe, Haaland…)"
          autocomplete="off"
          minlength="3"
        />

        <!--
          League selector — REQUIRED by API-Football.
          The /players?search= endpoint mandates a league or team ID.
          IDs sourced from: https://www.api-football.com/documentation-v3
        -->
        <select id="scoutLeagueSelect" class="scout-search-form__select" aria-label="Select league">
          <option value="">— Select League —</option>
          <optgroup label="Europe">
            <option value="39">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League</option>
            <option value="140">🇪🇸 La Liga</option>
            <option value="78">🇩🇪 Bundesliga</option>
            <option value="135">🇮🇹 Serie A</option>
            <option value="61">🇫🇷 Ligue 1</option>
            <option value="2">🏆 UEFA Champions League</option>
          </optgroup>
          <optgroup label="International">
            <option value="1">🌍 FIFA World Cup</option>
          </optgroup>
        </select>

        <!-- Client-side position filter (applied after results return) -->
        <select id="scoutPositionFilter" class="scout-search-form__select" aria-label="Filter by position">
          <option value="">All Positions</option>
          <option value="Goalkeeper">Goalkeeper</option>
          <option value="Defender">Defender</option>
          <option value="Midfielder">Midfielder</option>
          <option value="Attacker">Attacker</option>
        </select>

        <button type="submit" class="btn-primary">Search</button>
      </form>
    </section>

    <section class="container" aria-live="polite" aria-label="Search results">
      <div id="scoutLoadingState" class="state-panel state-panel--hidden"></div>
      <div id="scoutErrorState"   class="state-panel state-panel--hidden"></div>
      <div id="scoutEmptyState"   class="state-panel state-panel--hidden"></div>
      <div id="scoutResultsGrid"  class="legends-grid" role="list"></div>
      <nav id="scoutPagination"   class="scout-pagination" aria-label="Results pages"></nav>
    </section>

  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Legends XI. Built for academic demonstration purposes.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app-live-scout.js"></script>
</body>
</html>
